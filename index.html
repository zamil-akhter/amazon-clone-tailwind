<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amazon Clone Practice</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="/src/input.css" rel="stylesheet" />
  </head>

  <body>
    <!-- Navbar -->
    <div class="nav-bar flex bg-[#131921] text-white gap-10 size-16 w-screen items-center justify-center">
      <!-- Navbar Icon -->
      <div
        class="bg-[url(https://upload.wikimedia.org/wikipedia/commons/thumb/0/06/Amazon_2024.svg/250px-Amazon_2024.svg.png)] w-28 h-8 bg-contain bg-no-repeat bg-center invert">
      </div>

      <!-- Navbar Address -->
      <div class="nav-address">
        <div class="ml-5 text-sm">Delivering to Chandigarh</div>
        <div class="flex row">
          <i class="fa-solid fa-location-dot"></i>
          <div class="address-second">Update location</div>
        </div>
      </div>

      <!-- Navbar Search -->
      <div class="nav-search bg-white flex text-black size-11 w-100 justify-between rounded-md border-2 border-black hover:border-[#febd68]">
        <select class="w-12 text-sm rounded-l-md px-2 bg-[#E6E6E6]">
          <option>All</option>
        </select>
        <input type="search" class="text-sm pl-2 w-full border-none outline-none" placeholder="Search Amazon.in" />
        <div class="search-icon text-lg flex justify-center items-center bg-[#febd68] w-14 rounded-r-md">
          <i class="fa-solid fa-magnifying-glass"></i>
        </div>
      </div>

      <!-- Navbar Sign In -->
      <div class="nav-signin flex-col items-center">
        <div class="sign-first text-gray-400">Hello, signin</div>
        <div class="sign-second">Account & Lists</div>
      </div>

      <!-- Navbar Return -->
      <div class="nav-return flex-col items-center">
        <div class="text-gray-400">Return &</div>
        <div class="">Orders</div>
      </div>

      <!-- Navbar Cart -->
      <div class="nav-cart flex items-center">
        <i class="fa-solid fa-cart-shopping"></i>
        <p>cart</p>
      </div>
    </div>
  </body>
</html>
